  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:flex; align-items:center; gap:10px; font-family:'Exo 2',sans-serif; font-weight:700; font-size:15px; letter-spacing:.14em; color:#e7ecf3;\">\n        <span style=\"color:#8fc1e3;\">✠<\u002Fspan><span>DEUS VULT<\u002Fspan>\n      <\u002Fa>\n      <div style=\"display:flex; align-items:center; gap:28px; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase;\">\n        <a href=\"index.html\" style=\"color:#828c9d;\">Головна<\u002Fa>\n        <a href=\"Ranking-DPS.dc.html\" style=\"color:#828c9d;\">Рейтинг DPS<\u002Fa>\n        <a href=\"Ranking-Heal.dc.html\" style=\"color:#8fc1e3;\">Рейтинг Heal<\u002Fa>\n        <a href=\"Potion-Stats.dc.html\" style=\"color:#828c9d;\">Статистика Зіль<\u002Fa>\n        <a href=\"Analytics.dc.html\" style=\"color:#828c9d;\">Аналітика<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- page header -->\n    <div style=\"display:flex; align-items:flex-end; justify-content:space-between; padding:48px 0 28px; flex-wrap:wrap; gap:20px;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.3em; text-transform:uppercase; color:#8fc1e3;\">Рейтинг<\u002Fdiv>\n        <div style=\"font-family:'Exo 2',sans-serif; font-weight:800; font-size:38px; letter-spacing:.01em; color:#e7ecf3; margin-top:10px;\">Лікування за секунду<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif; font-size:15px; color:#828c9d; margin-top:8px;\">Ефективний HPS по останньому рейдовому вечору. Парс — перцентиль серед усього серверу.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:10px; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase;\">\n        <div style=\"background:#10151f; border:1px solid rgba(255,255,255,0.1); color:#cdd6e2; padding:9px 16px; border-radius:3px;\">Усі хілери<\u002Fdiv>\n        <div style=\"background:transparent; border:1px solid rgba(255,255,255,0.08); color:#6b7589; padding:9px 16px; border-radius:3px;\">Mythic<\u002Fdiv>\n        <div style=\"background:transparent; border:1px solid rgba(255,255,255,0.08); color:#6b7589; padding:9px 16px; border-radius:3px;\">27.06.26<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- table -->\n    <div style=\"border:1px solid rgba(255,255,255,0.07); border-radius:6px; overflow:hidden; margin-bottom:64px;\">\n      <div style=\"display:grid; grid-template-columns:56px 1.4fr 170px 120px 1fr 72px; gap:16px; padding:14px 22px; background:#0d1119; border-bottom:1px solid rgba(255,255,255,0.06); font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#6b7589;\">\n        <div>#<\u002Fdiv><div>Гравець<\u002Fdiv><div>Спек<\u002Fdiv><div style=\"text-align:right;\">HPS<\u002Fdiv><div><\u002Fdiv><div style=\"text-align:right;\">Парс<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"8\">\n        <div style=\"display:grid; grid-template-columns:56px 1.4fr 170px 120px 1fr 72px; gap:16px; align-items:center; padding:15px 22px; border-bottom:1px solid rgba(255,255,255,0.04); background:#0a0d13;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:{{ r.rankColor }};\">{{ r.rank }}<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:11px;\">\n            <span style=\"width:8px; height:8px; border-radius:50%; background:{{ r.clsColor }}; flex:none;\"><\u002Fspan>\n            <span style=\"font-family:'Manrope',sans-serif; font-weight:600; font-size:15px; color:#e7ecf3;\">{{ r.name }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'Manrope',sans-serif; font-size:13px; color:#828c9d;\">{{ r.spec }}<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#e7ecf3; text-align:right;\">{{ r.hps }}<\u002Fdiv>\n          <div style=\"height:7px; background:rgba(255,255,255,0.05); border-radius:4px; overflow:hidden;\">\n            <div style=\"height:100%; width:{{ r.pct }}; background:linear-gradient(90deg,#4f9a7a,#7fdcb4); border-radius:4px;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#7fdcb4; text-align:right;\">{{ r.parse }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- footer -->\n    <div style=\"display:flex; align-items:center; justify-content:space-between; padding:26px 0; border-top:1px solid rgba(255,255,255,0.06); font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#525b6c;\">\n      <span>© Гільдія «Deus Vult»<\u002Fspan>\n      <span>оновлено 27.06.26<\u002Fspan>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const data = [\n      [\"Гравець-Альфа\", \"#E8E8E8\", \"Holy\", \"142.0k\", 100, \"99\"],\n      [\"Гравець-Бета\", \"#F58CBA\", \"Holy\", \"134.5k\", 94.7, \"97\"],\n      [\"Гравець-Гамма\", \"#FF7D0A\", \"Restoration\", \"129.8k\", 91.4, \"95\"],\n      [\"Гравець-Дельта\", \"#0070DE\", \"Restoration\", \"122.4k\", 86.2, \"92\"],\n      [\"Гравець-Епсилон\", \"#00FF96\", \"Mistweaver\", \"118.1k\", 83.2, \"90\"],\n      [\"Гравець-Дзета\", \"#33937F\", \"Preservation\", \"113.7k\", 80.1, \"88\"],\n      [\"Гравець-Ета\", \"#E8E8E8\", \"Discipline\", \"108.2k\", 76.2, \"85\"],\n      [\"Гравець-Тета\", \"#F58CBA\", \"Holy\", \"102.9k\", 72.5, \"82\"],\n    ];\n    const rows = data.map((d, i) => ({\n      rank: i + 1,\n      rankColor: i < 3 ? \"#7fdcb4\" : \"#525b6c\",\n      name: d[0], clsColor: d[1], spec: d[2], hps: d[3],\n      pct: d[4] + \"%\", parse: d[5],\n    }));\n    return { rows };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
