name: Update Guild Data
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run DPS collector
        run: python fetch_guild_data.py
      - name: Run Heal collector
        run: python fetch_heal_data.py
      - name: Run Potion collector
        run: python fetch_potion_data.py
      - name: Run Total Damage collector
        run: python fetch_total_damage.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/guild-data.json data/guild-heal.json data/potion-stats.json data/total-damage.json
          git stash
          git pull --rebase origin master
          git stash pop
          git diff --staged --quiet || git commit -m "Auto-update guild data $(date -u '+%Y-%m-%d')"
          git push origin master
