<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рейтинг DPS — Deus Vult</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0a0c10;
    --bg2: #111318;
    --bg3: #1a1d24;
    --border: #2a2d35;
    --gold: #c9a84c;
    --gold-dim: #7a6030;
    --ice: #7ecfef;
    --text: #d4d8e0;
    --text-muted: #6b7080;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

  nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 16px;
    color: var(--gold);
    letter-spacing: .05em;
    margin-right: 32px;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    transition: color .15s, background .15s;
  }
  .nav-links a:hover { color: var(--text); background: var(--bg3); }
  .nav-links a.active { color: var(--gold); background: rgba(201,168,76,.1); }

  .page-header {
    padding: 40px 24px 28px;
    max-width: 1200px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }
  .page-header h1 {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: .04em;
    margin-bottom: 8px;
  }
  .page-header p { color: var(--text-muted); font-size: 13px; line-height: 1.6; }
  .page-header p a { color: var(--ice); text-decoration: none; }
  .page-header p a:hover { text-decoration: underline; }
  .updated-at { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .controls {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .control-group { display: flex; flex-direction: column; gap: 4px; }
  .control-group label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-muted);
  }
  select {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    outline: none;
    transition: border-color .15s;
    min-width: 160px;
  }
  select:hover, select:focus { border-color: var(--gold-dim); }

  .results-info {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
    padding-bottom: 2px;
  }
  .results-info strong { color: var(--text); }

  .table-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 48px;
    overflow-x: auto;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  thead th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  thead th.boss-col {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    padding: 12px 8px;
    max-height: 130px;
    font-size: 10px;
    text-transform: none;
    letter-spacing: 0;
  }
  thead th:first-child { width: 40px; text-align: center; }

  tbody tr { border-bottom: 1px solid rgba(42,45,53,.6); transition: background .1s; }
  tbody tr:hover { background: var(--bg2); }

  td { padding: 10px 12px; white-space: nowrap; }
  td:first-child { text-align: center; color: var(--text-muted); font-size: 12px; }

  .player-name { font-weight: 600; color: var(--text); }

  .spec-badge {
    display: inline-flex;
    align-items: center;
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .score-bar { display: flex; align-items: center; gap: 8px; }
  .score-val { font-weight: 600; font-variant-numeric: tabular-nums; min-width: 40px; text-align: right; }
  .bar-track { width: 60px; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }

  .rank-badge { font-size: 11px; font-variant-numeric: tabular-nums; color: var(--text-muted); }
  .rank-badge.top { color: var(--gold); font-weight: 600; }

  .dps-val { font-variant-numeric: tabular-nums; }
  .dps-val.zero { color: var(--border); }

  .cls-Death\ Knight { color: #c41e3a; }
  .cls-Druid         { color: #ff7c0a; }
  .cls-Hunter        { color: #aad372; }
  .cls-Mage          { color: #3fc7eb; }
  .cls-Paladin       { color: #f48cba; }
  .cls-Priest        { color: #e0e0e0; }
  .cls-Rogue         { color: #fff468; }
  .cls-Shaman        { color: #0070dd; }
  .cls-Warlock       { color: #8788ee; }
  .cls-Warrior       { color: #c69b3a; }

  .loading { text-align: center; padding: 60px 24px; color: var(--text-muted); }
  .loading-spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { text-align: center; padding: 24px; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border); }
  footer a { color: var(--ice); text-decoration: none; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../">✠ DEUS VULT</a>
  <div class="nav-links">
    <a href="../">Головна</a>
    <a href="./" class="active">Рейтинг DPS</a>
    <a href="../analytics/">Аналітика</a>
  </div>
</nav>

<div class="page-header">
  <h1>Рейтинг DPS</h1>
  <p>Дані з <a href="https://uwu-logs.xyz" target="_blank">uwu-logs.xyz</a> — режим ЦЛК 25 ХМ. Оновлюється раз на добу.</p>
  <div class="updated-at" id="updatedAt"></div>
</div>

<div class="controls">
  <div class="control-group">
    <label>Клас</label>
    <select id="classSelect">
      <option value="">Всі класи</option>
    </select>
  </div>
  <div class="control-group">
    <label>Спеціалізація</label>
    <select id="specSelect">
      <option value="">Всі спеки</option>
    </select>
  </div>
  <div class="results-info" id="resultsInfo"></div>
</div>

<div class="table-wrap">
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div>Завантаження даних...</div>
  </div>
  <table id="rankTable" style="display:none">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<footer>© Гільдія «Deus Vult», сервер <a href="https://freedom-wow.in.ua" target="_blank">Freedom WoW</a></footer>

<script>
const DATA_URL = '../data/guild-data.json';

const BOSS_LABELS = {
  'Lord Marrowgar': 'Marrowgar',
  'Lady Deathwhisper': 'Deathwhisper',
  'Deathbringer Saurfang': 'Saurfang',
  'Festergut': 'Festergut',
  'Rotface': 'Rotface',
  'Professor Putricide': 'Putricide',
  'Blood Prince Council': 'BPC',
  "Blood-Queen Lana'thel": "Lana'thel",
  'Sindragosa': 'Sindragosa',
  'The Lich King': 'LK',
  'Toravon the Ice Watcher': 'Toravon',
  'Halion': 'Halion',
  "Anub'arak": "Anub'arak",
};

const DPS_BOSSES = Object.keys(BOSS_LABELS);

let allRows = [], bossOrder = [], classes = [], specsByClass = {};

const classSelect = document.getElementById('classSelect');
const specSelect  = document.getElementById('specSelect');

async function loadData() {
  try {
    const res  = await fetch(DATA_URL);
    const data = await res.json();
    allRows     = data.rows || [];
    bossOrder   = (data.bossOrder || []).filter(b => DPS_BOSSES.includes(b));
    classes     = data.classes || [];
    specsByClass = data.specsByClass || {};

    if (data.lastUpdated) {
      const d = new Date(data.lastUpdated);
      document.getElementById('updatedAt').textContent =
        'Оновлено: ' + d.toLocaleString('uk-UA', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    }

    classes.forEach(cls => {
      const o = document.createElement('option');
      o.value = cls; o.textContent = cls;
      classSelect.appendChild(o);
    });

    buildHeader();
    render();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('rankTable').style.display = '';
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p style="color:#e05555">Помилка завантаження даних. Перевір чи існує файл data/guild-data.json</p>';
  }
}

classSelect.addEventListener('change', () => {
  const cls = classSelect.value;
  specSelect.innerHTML = '<option value="">Всі спеки</option>';
  if (cls && specsByClass[cls]) {
    specsByClass[cls].forEach(sp => {
      const o = document.createElement('option');
      o.value = sp; o.textContent = sp;
      specSelect.appendChild(o);
    });
  }
  render();
});
specSelect.addEventListener('change', render);

function buildHeader() {
  const tr = document.createElement('tr');
  ['#', 'Гравець', 'Клас / Спек', 'Server Rank', 'Score', ...bossOrder].forEach((c, i) => {
    const th = document.createElement('th');
    if (i >= 5) {
      th.className = 'boss-col';
      th.textContent = BOSS_LABELS[c] || c;
    } else {
      th.textContent = c;
    }
    tr.appendChild(th);
  });
  document.getElementById('tableHead').appendChild(tr);
}

function scoreColor(s) {
  if (s >= 95) return '#ffd700';
  if (s >= 75) return '#a335ee';
  if (s >= 50) return '#0070dd';
  if (s >= 25) return '#1eff00';
  return '#9d9d9d';
}

function render() {
  const cls  = classSelect.value;
  const spec = specSelect.value;

  let rows = allRows.filter(r => {
    if (cls  && r.class !== cls)  return false;
    if (spec && r.spec  !== spec) return false;
    return true;
  }).sort((a, b) => (b.overallScore || 0) - (a.overallScore || 0));

  document.getElementById('resultsInfo').innerHTML =
    `Знайдено: <strong>${rows.length}</strong>`;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  rows.forEach((row, idx) => {
    const tr = document.createElement('tr');

    // #
    td(tr, idx + 1, 'text-align:center;color:var(--text-muted);font-size:12px');

    // Name
    td(tr, `<span class="player-name">${row.name}</span>`);

    // Class / Spec
    const clsName = (row.class || '').replace(/\s+/g, '\\ ');
    td(tr, `<span class="cls-${row.class}" style="font-weight:600">${row.class}</span> <span class="spec-badge">${row.spec}</span>`);

    // Rank
    const topCls = row.overallRank <= 50 ? ' top' : '';
    td(tr, `<span class="rank-badge${topCls}">#${row.overallRank}</span>`);

    // Score
    const sc = (row.overallScore || 0);
    const col = scoreColor(sc);
    td(tr, `<div class="score-bar">
      <span class="score-val" style="color:${col}">${sc.toFixed(1)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(sc,100)}%;background:${col}"></div></div>
    </div>`);

    // Boss DPS
    bossOrder.forEach(boss => {
      const val = row.bosses?.[boss] || 0;
      if (val > 0) td(tr, `<span class="dps-val">${Math.round(val).toLocaleString('uk-UA')}</span>`);
      else         td(tr, `<span class="dps-val zero">—</span>`);
    });

    tbody.appendChild(tr);
  });
}

function td(tr, html, style) {
  const el = document.createElement('td');
  if (style) el.style.cssText = style;
  el.innerHTML = String(html);
  tr.appendChild(el);
}

loadData();
</script>
</body>
</html>
