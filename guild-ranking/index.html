<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рейтинг DPS — Deus Vult</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap');

  :root {
    --bg:#070a0f; --bg2:#0d121b; --bg3:#141b26;
    --border:#1e2836; --border2:#283447;
    --accent:#8fc1e3; --accent-dim:#4a6f8a;
    --text:#dce4ee; --text-muted:#7c8aa0; --text-faint:#566275;
    --icc:#102234; --icc-border:#1f4060;
    --rs:#10241a;  --rs-border:#1f5030;
    --danger:#e06a6a;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Manrope',sans-serif; font-size:14px;
    background-image:radial-gradient(900px 500px at 80% -10%, rgba(143,193,227,.06), transparent 60%); }

  nav { background:rgba(13,18,27,.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--border);
    padding:0 24px; display:flex; align-items:center; height:56px; position:sticky; top:0; z-index:100; }
  .nav-logo { font-family:'Exo 2',sans-serif; font-weight:800; font-size:16px; color:var(--accent);
    letter-spacing:.08em; margin-right:36px; text-decoration:none; display:flex; align-items:center; gap:8px; }
  .nav-logo span { width:8px; height:8px; background:var(--accent); border-radius:2px; transform:rotate(45deg); box-shadow:0 0 12px var(--accent); }
  .nav-links { display:flex; gap:2px; flex-wrap:wrap; }
  .nav-links a { color:var(--text-muted); text-decoration:none; padding:7px 14px; border-radius:7px; font-size:13px; font-weight:600; transition:.15s; }
  .nav-links a:hover { color:var(--text); background:var(--bg3); }
  .nav-links a.active { color:var(--accent); background:rgba(143,193,227,.1); }

  .page-header { padding:40px 24px 20px; max-width:1600px; margin:0 auto; }
  .eyebrow { font-family:'Exo 2',sans-serif; font-size:11px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--accent-dim); margin-bottom:10px; }
  .page-header h1 { font-family:'Exo 2',sans-serif; font-size:32px; font-weight:800; color:var(--text); margin-bottom:8px; }
  .page-header h1 b { color:var(--accent); }
  .updated-at { font-size:12px; color:var(--text-faint); margin-top:6px; }

  .controls { max-width:1600px; margin:0 auto; padding:8px 24px 20px; display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap; }
  .control-group { display:flex; flex-direction:column; gap:6px; }
  .control-group label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--text-muted); }
  select { background:var(--bg2); border:1px solid var(--border2); color:var(--text); padding:9px 13px; border-radius:8px;
    font-size:13px; font-family:'Manrope',sans-serif; cursor:pointer; outline:none; min-width:170px; transition:.15s; }
  select:hover,select:focus { border-color:var(--accent-dim); }
  .results-info { margin-left:auto; font-size:12px; color:var(--text-muted); align-self:center; }
  .results-info strong { color:var(--accent); font-size:14px; }

  .table-wrap { max-width:1600px; margin:0 auto; padding:0 24px 48px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }

  thead th { text-align:left; padding:9px 10px; font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.08em; color:var(--text-muted); border-bottom:1px solid var(--border2); white-space:nowrap; }

  thead tr.group-row th { border-bottom:none; padding:6px 4px 4px; }
  thead tr.group-row th.g-icc { text-align:center; font-family:'Exo 2',sans-serif; font-size:10px; font-weight:700;
    letter-spacing:.14em; color:var(--accent); background:var(--icc); border:1px solid var(--icc-border);
    border-bottom:none; border-radius:6px 6px 0 0; padding:6px 8px; }
  thead tr.group-row th.g-rs { text-align:center; font-family:'Exo 2',sans-serif; font-size:10px; font-weight:700;
    letter-spacing:.14em; color:#7fd4a0; background:var(--rs); border:1px solid var(--rs-border);
    border-bottom:none; border-radius:6px 6px 0 0; padding:6px 8px; }

  thead tr.col-row th { border-bottom:1px solid var(--border2); }
  thead tr.col-row th.boss-icc { text-align:center; font-size:10px; font-weight:500; letter-spacing:0;
    background:var(--icc); border-left:1px solid var(--icc-border); border-right:1px solid var(--icc-border); color:var(--accent); padding:6px; }
  thead tr.col-row th.boss-rs { text-align:center; font-size:10px; font-weight:500; letter-spacing:0;
    background:var(--rs); border-left:1px solid var(--rs-border); border-right:1px solid var(--rs-border); color:#7fd4a0; padding:6px; }

  tbody tr { border-bottom:1px solid rgba(30,40,54,.6); transition:background .1s; }
  tbody tr:hover { background:var(--bg2); }
  td { padding:9px 10px; white-space:nowrap; vertical-align:middle; }
  td:first-child { text-align:center; color:var(--text-faint); font-size:11px; width:36px; }

  td.boss-icc { text-align:center; font-size:12px; font-variant-numeric:tabular-nums; background:rgba(16,34,52,.4); border-left:1px solid rgba(31,64,96,.25); border-right:1px solid rgba(31,64,96,.25); }
  td.boss-rs  { text-align:center; font-size:12px; font-variant-numeric:tabular-nums; background:rgba(16,36,26,.4); border-left:1px solid rgba(31,80,48,.25); border-right:1px solid rgba(31,80,48,.25); }
  td.boss-zero { color:var(--border2); }

  .player-name { font-weight:700; }
  .spec-badge { display:inline-flex; background:var(--bg3); border:1px solid var(--border2); padding:2px 8px; border-radius:5px; font-size:11px; color:var(--text-muted); }
  .score-val { font-weight:700; font-variant-numeric:tabular-nums; min-width:38px; text-align:right; }
  .rank-badge { font-size:12px; font-variant-numeric:tabular-nums; font-weight:700; }
  .rank-guild  { color:var(--text-muted); }
  .rank-top10  { color:#ffd96b; }
  .rank-top50  { color:var(--accent); }
  .rank-other  { color:var(--text-muted); }

  .cls-Death-Knight { color:#c41e3a; }
  .cls-Druid        { color:#ff7c0a; }
  .cls-Hunter       { color:#aad372; }
  .cls-Mage         { color:#3fc7eb; }
  .cls-Paladin      { color:#f48cba; }
  .cls-Priest       { color:#e0e0e0; }
  .cls-Rogue        { color:#fff468; }
  .cls-Shaman       { color:#0070dd; }
  .cls-Warlock      { color:#8788ee; }
  .cls-Warrior      { color:#c69b3a; }
  .cls-Feral-Combat { color:#ff7c0a; }

  .loading { text-align:center; padding:80px 24px; color:var(--text-muted); }
  .loading-spinner { width:34px; height:34px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 18px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  footer { text-align:center; padding:32px 24px; color:var(--text-faint); font-size:12px; border-top:1px solid var(--border); }
  footer a { color:var(--accent); text-decoration:none; }
  @media (prefers-reduced-motion:reduce) { * { animation:none !important; transition:none !important; } }

  /* ── Гамбургер (прихований на десктопі) ── */
  .nav-toggle { display:none; background:none; border:1px solid var(--border2); border-radius:8px;
    color:var(--text); width:38px; height:38px; cursor:pointer; margin-left:auto; align-items:center;
    justify-content:center; font-size:18px; line-height:1; }
  .nav-toggle:hover { border-color:var(--accent-dim); color:var(--accent); }

  /* ── МОБІЛЬНА ВЕРСІЯ ── */
  @media (max-width:640px) {
    nav { padding:0 16px; height:52px; flex-wrap:wrap; }
    .nav-logo { margin-right:0; font-size:15px; }
    .nav-toggle { display:flex; }
    /* меню-накладка: суцільний фон, клікабельне, поверх усього */
    nav { z-index:200; }
    .nav-links { display:none; flex-direction:column; gap:2px; width:100%;
      padding:10px 16px 16px; order:3;
      position:absolute; top:52px; left:0; right:0;
      background:#0b1019; border-bottom:1px solid var(--border);
      box-shadow:0 18px 40px rgba(0,0,0,.55); z-index:210; }
    .nav-links.open { display:flex; }
    .nav-links a { padding:13px 14px; font-size:15px; border-radius:8px; position:relative; z-index:1; }

    /* затемнення+блюр контенту — НИЖЧЕ навбару й меню, але вище контенту */
    .nav-overlay { position:fixed; inset:52px 0 0 0; z-index:150;
      background:rgba(4,7,12,.55); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px);
      opacity:0; pointer-events:none; transition:opacity .18s; }
    .nav-overlay.show { opacity:1; pointer-events:auto; }

    .page-header { padding:24px 16px 12px !important; }
    .page-header h1 { font-size:23px !important; }
    .hero { min-height:auto !important; padding:48px 18px !important; }
    .hero-logo { width:200px !important; }
    .hero h1 { letter-spacing:.05em !important; }

    .controls, .stats-bar, .windows, .archive, .table-wrap,
    .charts-wrap, .jump, .section { padding-left:16px !important; padding-right:16px !important; }
    .controls { gap:10px; }
    select { min-width:0; width:100%; }
    .control-group { width:100%; }
    .results-info { margin-left:0; width:100%; }

    .windows { grid-template-columns:1fr !important; gap:14px; }
    .stat-item { padding:16px 22px; }

    /* таблиці — горизонтальний скрол на дотик */
    .table-wrap, .window, .archive-window { -webkit-overflow-scrolling:touch; }
    .window { overflow-x:auto; }
    table { min-width:520px; }
  }

</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../"><span></span>DEUS VULT</a>
  <div class="nav-links">
    <a href="../">Головна</a>
    <a href="./" class="active">Рейтинг DPS</a>
    <a href="../heal-ranking/">Рейтинг Heal</a>
    <a href="../tank-ranking/">Рейтинг Tank</a>
    <a href="../potion-stats/">Статистика Зіль</a>
    <a href="../total-damage/">Total Damage</a>
    <a href="../analytics/">Аналітика</a>
  </div>
  <button class="nav-toggle" aria-label="Меню">☰</button>
</nav>

<div class="page-header">
  <div class="eyebrow">Рейтинг урону</div>
  <h1>Рейтинг DPS <b>Deus Vult</b></h1>
  <div class="updated-at" id="updatedAt"></div>
</div>

<div class="controls">
  <div class="control-group">
    <label>Клас</label>
    <select id="classSelect"><option value="">Всі класи</option></select>
  </div>
  <div class="control-group">
    <label>Спеціалізація</label>
    <select id="specSelect"><option value="">Всі спеки</option></select>
  </div>
  <div class="results-info" id="resultsInfo"></div>
</div>

<div class="table-wrap">
  <div class="loading" id="loading"><div class="loading-spinner"></div><div>Завантаження…</div></div>
  <table id="rankTable" style="display:none">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<footer>© Гільдія «Deus Vult», сервер <a href="https://freedom-wow.in.ua" target="_blank">Freedom WoW</a></footer>

<script>
const DATA_URL = '../data/guild-data.json';

const ICC_BOSSES = [
  'Lord Marrowgar','Lady Deathwhisper','Deathbringer Saurfang',
  'Festergut','Rotface','Professor Putricide','Blood Prince Council',
  "Blood-Queen Lana'thel",'Sindragosa','The Lich King',
];
const RS_BOSSES = [
  'Halion','Saviana Ragefire','General Zarithrian','Baltharus the Warborn',
];

const BOSS_LABELS = {
  'Lord Marrowgar':'Marrowgar','Lady Deathwhisper':'Deathwhisper',
  'Deathbringer Saurfang':'Saurfang','Festergut':'Festergut',
  'Rotface':'Rotface','Professor Putricide':'Putricide',
  'Blood Prince Council':'BPC',"Blood-Queen Lana'thel":"Lana'thel",
  'Sindragosa':'Sindragosa','The Lich King':'Lich King',
  'Halion':'Halion','Saviana Ragefire':'Saviana',
  'General Zarithrian':'Zarithrian','Baltharus the Warborn':'Baltharus',
};

let allRows = [], classes = [], specsByClass = {};

const classSelect = document.getElementById('classSelect');
const specSelect  = document.getElementById('specSelect');

function scoreColor(s) {
  if (s >= 95) return '#ffd96b';
  if (s >= 75) return '#c08bf0';
  if (s >= 50) return '#5a9bd4';
  if (s >= 25) return '#5ad17a';
  return '#7c8aa0';
}

async function loadData() {
  try {
    const res  = await fetch(DATA_URL);
    const data = await res.json();
    allRows      = data.rows || [];
    classes      = data.classes || [];
    specsByClass = data.specsByClass || {};

    if (data.lastUpdated) {
      const d = new Date(data.lastUpdated);
      document.getElementById('updatedAt').textContent =
        'Оновлено: ' + d.toLocaleString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    }

    classes.forEach(cls => {
      const o = document.createElement('option');
      o.value = cls; o.textContent = cls;
      classSelect.appendChild(o);
    });

    buildHeader();
    render();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('rankTable').style.display = '';
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p style="color:var(--danger)">Помилка завантаження даних</p>';
  }
}

classSelect.addEventListener('change', () => {
  const cls = classSelect.value;
  specSelect.innerHTML = '<option value="">Всі спеки</option>';
  if (cls && specsByClass[cls]) {
    specsByClass[cls].forEach(sp => {
      const o = document.createElement('option');
      o.value = sp; o.textContent = sp;
      specSelect.appendChild(o);
    });
  }
  render();
});
specSelect.addEventListener('change', render);

function buildHeader() {
  const thead = document.getElementById('tableHead');

  const tr1 = document.createElement('tr');
  tr1.className = 'group-row';
  for (let i = 0; i < 6; i++) tr1.appendChild(document.createElement('th'));

  const thIcc = document.createElement('th');
  thIcc.colSpan = ICC_BOSSES.length;
  thIcc.className = 'g-icc';
  thIcc.textContent = 'ICECROWN CITADEL';
  tr1.appendChild(thIcc);

  const thRs = document.createElement('th');
  thRs.colSpan = RS_BOSSES.length;
  thRs.className = 'g-rs';
  thRs.textContent = 'RUBY SANCTUM';
  tr1.appendChild(thRs);

  thead.appendChild(tr1);

  const tr2 = document.createElement('tr');
  tr2.className = 'col-row';

  ['#','Гравець','Клас / Спек','Guild Rank','Server Rank','Score'].forEach(t => {
    const th = document.createElement('th');
    th.textContent = t;
    tr2.appendChild(th);
  });

  ICC_BOSSES.forEach(boss => {
    const th = document.createElement('th');
    th.className = 'boss-icc';
    th.textContent = BOSS_LABELS[boss] || boss;
    tr2.appendChild(th);
  });
  RS_BOSSES.forEach(boss => {
    const th = document.createElement('th');
    th.className = 'boss-rs';
    th.textContent = BOSS_LABELS[boss] || boss;
    tr2.appendChild(th);
  });

  thead.appendChild(tr2);
}

function render() {
  const cls  = classSelect.value;
  const spec = specSelect.value;

  let rows = allRows.filter(r => {
    if (cls  && r.class !== cls)  return false;
    if (spec && r.spec  !== spec) return false;
    return true;
  }).sort((a,b) => (b.overallScore||0) - (a.overallScore||0));

  document.getElementById('resultsInfo').innerHTML =
    `Знайдено: <strong>${rows.length}</strong>`;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  rows.forEach((row, idx) => {
    const guildRank  = idx + 1;
    const serverRank = row.overallRank || 9999;
    const tr = document.createElement('tr');

    addTd(tr, guildRank, 'text-align:center;color:var(--text-faint);font-size:11px');

    const clsKey = row.class.replace(/ /g, '-');
    addTd(tr, `<span class="player-name cls-${clsKey}">${row.name}</span>`);
    addTd(tr, `<span class="cls-${clsKey}" style="font-weight:700">${row.class}</span> <span class="spec-badge">${row.spec}</span>`);
    addTd(tr, `<span class="rank-badge rank-guild">#${guildRank}</span>`);

    const srCls = serverRank <= 10 ? 'rank-top10' : serverRank <= 50 ? 'rank-top50' : 'rank-other';
    addTd(tr, `<span class="rank-badge ${srCls}">#${serverRank}</span>`);

    const sc  = row.overallScore || 0;
    addTd(tr, `<span class="score-val" style="color:${scoreColor(sc)};font-weight:700">${sc.toFixed(2)}</span>`);

    ICC_BOSSES.forEach(boss => {
      const val = row.bosses?.[boss] || 0;
      const td  = document.createElement('td');
      td.className = 'boss-icc' + (val > 0 ? '' : ' boss-zero');
      td.textContent = val > 0 ? Math.round(val).toLocaleString('uk-UA') : '—';
      tr.appendChild(td);
    });
    RS_BOSSES.forEach(boss => {
      const val = row.bosses?.[boss] || 0;
      const td  = document.createElement('td');
      td.className = 'boss-rs' + (val > 0 ? '' : ' boss-zero');
      td.textContent = val > 0 ? Math.round(val).toLocaleString('uk-UA') : '—';
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

function addTd(tr, html, style) {
  const td = document.createElement('td');
  if (style) td.style.cssText = style;
  td.innerHTML = String(html);
  tr.appendChild(td);
}

loadData();
</script>

<script>
(function(){
  var t = document.querySelector('.nav-toggle');
  var l = document.querySelector('.nav-links');
  if (!t || !l) return;
  var ov = document.createElement('div');
  ov.className = 'nav-overlay';
  document.body.appendChild(ov);
  function close(){ l.classList.remove('open'); ov.classList.remove('show'); }
  function toggle(){
    var open = l.classList.toggle('open');
    ov.classList.toggle('show', open);
  }
  t.addEventListener('click', toggle);
  ov.addEventListener('click', close);
  l.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', close); });
})();
</script>

</body>
</html>
