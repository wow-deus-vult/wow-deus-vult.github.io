<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deus Vult — Freedom WoW</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@500;600;700;800;900&family=Manrope:wght@400;500;600;700&display=swap');

  :root {
    --bg:#070a0f; --bg2:#0d121b; --bg3:#141b26;
    --border:#1e2836; --border2:#283447;
    --accent:#8fc1e3; --accent-dim:#4a6f8a;
    --text:#dce4ee; --text-muted:#7c8aa0; --text-faint:#566275;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Manrope',sans-serif; font-size:14px; min-height:100vh; }

  nav { background:rgba(13,18,27,.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--border);
    padding:0 24px; display:flex; align-items:center; height:56px; position:sticky; top:0; z-index:100; }
  .nav-logo { font-family:'Exo 2',sans-serif; font-weight:800; font-size:16px; color:var(--accent);
    letter-spacing:.08em; margin-right:36px; text-decoration:none; display:flex; align-items:center; gap:8px; }
  .nav-logo span { width:8px; height:8px; background:var(--accent); border-radius:2px; transform:rotate(45deg); box-shadow:0 0 12px var(--accent); }
  .nav-links { display:flex; gap:2px; flex-wrap:wrap; }
  .nav-links a { color:var(--text-muted); text-decoration:none; padding:7px 14px; border-radius:7px; font-size:13px; font-weight:600; transition:.15s; }
  .nav-links a:hover { color:var(--text); background:var(--bg3); }
  .nav-links a.active { color:var(--accent); background:rgba(143,193,227,.1); }

  /* ── HERO ── */
  .hero { position:relative; min-height:440px; display:flex; align-items:center; justify-content:center;
    text-align:center; overflow:hidden; padding:90px 24px; }
  .hero::before { content:''; position:absolute; inset:0;
    background:
      radial-gradient(ellipse 60% 55% at 50% 0%, rgba(143,193,227,.12) 0%, transparent 68%),
      radial-gradient(ellipse 40% 60% at 18% 100%, rgba(74,111,138,.10) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 82% 100%, rgba(74,111,138,.10) 0%, transparent 60%);
    animation:pulse 8s ease-in-out infinite alternate; }
  @keyframes pulse { from { opacity:.55; } to { opacity:1; } }
  .hero::after { content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, var(--accent), transparent); opacity:.5; }

  .hero-content { position:relative; z-index:1; }
  .hero-logo { width:280px; height:auto; margin-bottom:24px; filter:drop-shadow(0 0 24px rgba(143,193,227,.35)); }

  .hero h1 { font-family:'Exo 2',sans-serif; font-size:clamp(40px,7vw,72px); font-weight:900; color:var(--text);
    letter-spacing:.08em; line-height:1; margin-bottom:12px; text-shadow:0 0 50px rgba(143,193,227,.25); }
  .hero h1 b { color:var(--accent); font-weight:900; }
  .hero-subtitle { font-family:'Exo 2',sans-serif; font-size:clamp(12px,2vw,15px); color:var(--text-muted);
    letter-spacing:.28em; text-transform:uppercase; margin-bottom:26px; }
  .hero-divider { width:120px; height:1px; background:linear-gradient(90deg, transparent, var(--accent), transparent); margin:0 auto 28px; opacity:.5; }

  /* ── STATS BAR ── */
  .stats-bar { border-top:1px solid var(--border); border-bottom:1px solid var(--border); background:var(--bg2);
    display:flex; justify-content:center; flex-wrap:wrap; }
  .stat-item { padding:22px 44px; text-align:center; border-right:1px solid var(--border); }
  .stat-item:last-child { border-right:none; }
  .stat-value { font-family:'Exo 2',sans-serif; font-size:26px; font-weight:800; color:var(--accent); display:block; line-height:1; margin-bottom:5px; }
  .stat-label { font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--text-muted); }

  footer { text-align:center; padding:36px 24px; color:var(--text-faint); font-size:12px; border-top:1px solid var(--border); }
  footer a { color:var(--accent); text-decoration:none; }
  footer a:hover { text-decoration:underline; }
  @media (prefers-reduced-motion:reduce) { * { animation:none !important; transition:none !important; } }

  /* ── Гамбургер ── */
  .nav-toggle { display:none; background:none; border:1px solid var(--border2); border-radius:8px;
    color:var(--text); width:38px; height:38px; cursor:pointer; margin-left:auto; align-items:center;
    justify-content:center; font-size:18px; line-height:1; }
  .nav-toggle:hover { border-color:var(--accent-dim); color:var(--accent); }

  /* ── МОБІЛЬНА ВЕРСІЯ ── */
  @media (max-width:640px) {
    nav { padding:0 16px; height:52px; flex-wrap:wrap; }
    .nav-logo { margin-right:0; font-size:15px; }
    .nav-toggle { display:flex; }
    nav { z-index:200; }
    .nav-links { display:none; flex-direction:column; gap:2px; width:100%;
      padding:10px 16px 16px; order:3;
      position:absolute; top:52px; left:0; right:0;
      background:#0b1019; border-bottom:1px solid var(--border);
      box-shadow:0 18px 40px rgba(0,0,0,.55); z-index:210; }
    .nav-links.open { display:flex; }
    .nav-links a { padding:13px 14px; font-size:15px; border-radius:8px; position:relative; z-index:1; }
    .nav-overlay { position:fixed; inset:52px 0 0 0; z-index:150;
      background:rgba(4,7,12,.55); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px);
      opacity:0; pointer-events:none; transition:opacity .18s; }
    .nav-overlay.show { opacity:1; pointer-events:auto; }
    .hero { min-height:auto !important; padding:64px 18px 48px !important; }
    .hero-logo { width:200px !important; }
    .hero h1 { letter-spacing:.05em !important; }
    .stat-item { padding:16px 22px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="./"><span></span>DEUS VULT</a>
  <div class="nav-links">
    <a href="./" class="active">Головна</a>
    <a href="./guild-ranking/">Рейтинг DPS</a>
    <a href="./heal-ranking/">Рейтинг Heal</a>
    <a href="./potion-stats/">Статистика Зіль</a>
    <a href="./total-damage/">Total Damage</a>
    <a href="./analytics/">Аналітика</a>
  </div>
  <button class="nav-toggle" aria-label="Меню">☰</button>
</nav>

<section class="hero">
  <div class="hero-content">
    <img class="hero-logo" src="./logo.png" alt="Deus Vult">
    <h1><b>DEUS VULT</b></h1>
    <p class="hero-subtitle">Freedom WoW</p>
    <div class="hero-divider"></div>
  </div>
</section>

<div class="stats-bar" id="statsBar">
  <div class="stat-item">
    <span class="stat-value" id="statPlayers">—</span>
    <span class="stat-label">Гравців</span>
  </div>
  <div class="stat-item">
    <span class="stat-value" id="statIcc">—</span>
    <span class="stat-label">Icecrown Citadel Raids</span>
  </div>
  <div class="stat-item">
    <span class="stat-value" id="statRs">—</span>
    <span class="stat-label">Ruby Sanctum Raids</span>
  </div>
  <div class="stat-item">
    <span class="stat-value" id="statLich">—</span>
    <span class="stat-label">Lich King Kills</span>
  </div>
  <div class="stat-item">
    <span class="stat-value" id="statUpdated">—</span>
    <span class="stat-label">Оновлено</span>
  </div>
</div>

<footer>
  © Гільдія «Deus Vult», сервер <a href="https://freedom-wow.in.ua" target="_blank">Freedom WoW</a>
</footer>

<script>
fetch('./data/guild-data.json')
  .then(r => r.json())
  .then(data => {
    const players = new Set(data.rows.map(r => r.name)).size;
    document.getElementById('statPlayers').textContent = players;

    if (data.lastUpdated) {
      const d = new Date(data.lastUpdated);
      const today = new Date();
      const diff  = Math.floor((today - d) / 86400000);
      document.getElementById('statUpdated').textContent =
        diff === 0 ? 'Сьогодні'
        : diff === 1 ? 'Вчора'
        : diff + ' дн. тому';
    }
  })
  .catch(() => {
    document.getElementById('statPlayers').textContent = '—';
  });

fetch('./data/guild-stats.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('statIcc').textContent  = data.icc_raids  ?? '—';
    document.getElementById('statRs').textContent   = data.rs_raids   ?? '—';
    document.getElementById('statLich').textContent = data.lich_king_kills ?? '—';
  })
  .catch(() => {
    document.getElementById('statIcc').textContent  = '—';
    document.getElementById('statRs').textContent   = '—';
    document.getElementById('statLich').textContent = '—';
  });
</script>

<script>
(function(){
  var t = document.querySelector('.nav-toggle');
  var l = document.querySelector('.nav-links');
  if (!t || !l) return;
  var ov = document.createElement('div');
  ov.className = 'nav-overlay';
  document.body.appendChild(ov);
  function close(){ l.classList.remove('open'); ov.classList.remove('show'); }
  function toggle(){
    var open = l.classList.toggle('open');
    ov.classList.toggle('show', open);
  }
  t.addEventListener('click', toggle);
  ov.addEventListener('click', close);
  l.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', close); });
})();
</script>

</body>
</html>
